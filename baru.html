<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kurva Parametrik - Advanced Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #060913; --bg-glass: rgba(17, 24, 39, 0.7); --border-glass: rgba(255, 255, 255, 0.1);
            --accent-cyan: #06b6d4; --accent-purple: #8b5cf6; --accent-pink: #ec4899; --accent-green: #10b981;
            --text-main: #f8fafc; --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, transparent 50%); }

        /* Panel Kiri & Kanan (Glassmorphism) */
        .sidebar, .table-panel { width: 340px; min-width: 340px; background: var(--bg-glass); backdrop-filter: blur(12px); border-right: 1px solid var(--border-glass); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; gap: 15px; z-index: 10; }
        .table-panel { border-right: none; border-left: 1px solid var(--border-glass); }
        
        .header h1 { font-size: 18px; font-weight: 800; background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; color: transparent; }
        .header p { font-size: 11px; color: var(--text-muted); }
        .team { background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); border-radius: 8px; padding: 10px; font-size: 11px; margin-top: 10px; }
        .team b { color: var(--accent-cyan); }

        .tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 6px; color: var(--text-muted); padding: 10px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; }
        .tab-btn:hover { border-color: var(--accent-cyan); color: var(--text-main); }
        .tab-btn.active { background: var(--accent-cyan); color: #000; border-color: var(--accent-cyan); }

        .input-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        input { background: rgba(0,0,0,0.5); border: 1px solid var(--border-glass); border-radius: 6px; color: #fff; padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none; }
        input:focus { border-color: var(--accent-purple); box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }

        .formula-box { background: rgba(139, 92, 246, 0.1); border-left: 3px solid var(--accent-purple); padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #c4b5fd; line-height: 1.6; }

        .btn-render { background: linear-gradient(45deg, var(--accent-cyan), var(--accent-purple)); color: white; border: none; border-radius: 6px; padding: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(6, 182, 212, 0.4); margin-top: auto; }
        .btn-render:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6); }

        /* Panel Tengah (Canvas Area) */
        .main-panel { flex: 1; display: flex; justify-content: center; align-items: center; background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGRlZnM+PHBhdHRlcm4gaWQ9ImdyaWQiIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGggZD0iTSAwIDEwIEwgNDAgMTAgTSAxMCAwIEwgMTAgNDAiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNTUsMjU1LDI1NSwwLjAyKSIvPjwvcGF0dGVybj48L2RlZnM+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0idXJsKCNncmlkKSIvPjwvc3ZnPg=='); padding: 20px; }
        
        .canvas-wrapper { position: relative; width: 650px; height: 650px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #canvas-ui { z-index: 5; cursor: crosshair; } /* Layer interaktif */
        
        .tooltip-info { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 8px 12px; border: 1px solid var(--border-glass); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; z-index: 10; pointer-events: none; }
        .tooltip-info span { color: var(--accent-pink); font-weight: bold; }

        /* Tabel Area */
        table { width: 100%; border-collapse: collapse; font-size: 10px; font-family: 'JetBrains Mono', monospace; }
        th { background: rgba(255,255,255,0.05); color: var(--accent-cyan); padding: 10px; text-align: left; position: sticky; top: 0; border-bottom: 1px solid var(--border-glass); }
        td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-muted); }
        .val-highlight { color: var(--accent-green); font-weight: bold; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h1>Engine Kurva Parametrik</h1>
            <p>Visualisasi Interaktif & Rasterisasi Koordinat</p>
            <div class="team">Tim: <b>Farah, Zuhair, Daffa, Rifki</b></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="setKurva('lingkaran', this)">Lingkaran</button>
            <button class="tab-btn" onclick="setKurva('elips', this)">Elips</button>
            <button class="tab-btn" onclick="setKurva('parabola', this)">Parabola</button>
            <button class="tab-btn" onclick="setKurva('hiperbola', this)">Hiperbola</button>
        </div>

        <div id="dynamic-inputs"></div>

        <div class="input-group">
            <label>Langkah Delta (Step / Resolusi)</label>
            <input type="number" id="inp-step" value="0.05" step="0.01" min="0.001">
        </div>

        <div class="formula-box" id="formula-display">Pilih kurva...</div>
        <button class="btn-render" onclick="render()">Eksekusi Render Data</button>
    </div>

    <div class="main-panel">
        <div class="canvas-wrapper">
            <div class="tooltip-info">Kursor: <span id="cursor-pos">X: 0, Y: 0</span></div>
            <canvas id="canvas-bg" width="650" height="650"></canvas>
            <canvas id="canvas-curve" width="650" height="650"></canvas>
            <canvas id="canvas-ui" width="650" height="650"></canvas>
        </div>
    </div>

    <div class="table-panel">
        <div class="header" style="margin-bottom: 10px;">
            <h1 style="font-size: 14px;">Log Komputasi Matriks</h1>
            <p id="metrik-info">Total Titik: 0 | Waktu: 0ms</p>
        </div>
        <div style="flex:1; overflow-y:auto;">
            <table id="logTable">
                <thead><tr><th>Iterasi</th><th>Parameter</th><th>Kordinat (X,Y)</th></tr></thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SIZE = 650, CENTER = SIZE / 2;
        const ctxBg = document.getElementById('canvas-bg').getContext('2d');
        const ctxCurve = document.getElementById('canvas-curve').getContext('2d');
        const canvasUI = document.getElementById('canvas-ui');
        const ctxUI = canvasUI.getContext('2d');
        
        let currentKurva = 'lingkaran';
        let generatedPoints = []; // Menyimpan data untuk tooltip interaktif

        const config = {
            lingkaran: `<div class="input-row"><div class="input-group"><label>Pusat Xc</label><input type="number" id="x" value="0"></div><div class="input-group"><label>Pusat Yc</label><input type="number" id="y" value="0"></div></div><div class="input-row"><div class="input-group"><label>Jari-jari (R)</label><input type="number" id="r" value="200"></div><div class="input-group"><label>Batas Sudut</label><input type="number" id="maxT" value="6.28"></div></div>`,
            elips: `<div class="input-row"><div class="input-group"><label>Pusat Xc</label><input type="number" id="x" value="0"></div><div class="input-group"><label>Pusat Yc</label><input type="number" id="y" value="0"></div></div><div class="input-row"><div class="input-group"><label>Mayor (a)</label><input type="number" id="a" value="250"></div><div class="input-group"><label>Minor (b)</label><input type="number" id="b" value="150"></div></div><div class="input-group"><label>Batas Sudut (Rad)</label><input type="number" id="maxT" value="6.28"></div>`,
            parabola: `<div class="input-row"><div class="input-group"><label>Puncak Xp</label><input type="number" id="x" value="0"></div><div class="input-group"><label>Puncak Yp</label><input type="number" id="y" value="-200"></div></div><div class="input-row"><div class="input-group"><label>Faktor (a)</label><input type="number" id="a" value="0.005" step="0.001"></div><div class="input-group"><label>Batas Rentang (t)</label><input type="number" id="maxT" value="300"></div></div>`,
            hiperbola: `<div class="input-row"><div class="input-group"><label>Pusat Xc</label><input type="number" id="x" value="0"></div><div class="input-group"><label>Pusat Yc</label><input type="number" id="y" value="0"></div></div><div class="input-row"><div class="input-group"><label>Transversal (a)</label><input type="number" id="a" value="100"></div><div class="input-group"><label>Konjugasi (b)</label><input type="number" id="b" value="60"></div></div><div class="input-group"><label>Batas Rentang (Rad)</label><input type="number" id="maxT" value="1.3"></div>`
        };

        function getV(id, def) { const e = document.getElementById(id); return e ? parseFloat(e.value) || def : def; }

        function setKurva(jenis, el) {
            currentKurva = jenis;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('dynamic-inputs').innerHTML = config[jenis];
            updateRumusText();
        }

        function updateRumusText() {
            let txt = "";
            if(currentKurva==='lingkaran') txt = `X = Xc + R * cos(θ)<br>Y = Yc + R * sin(θ)`;
            if(currentKurva==='elips') txt = `X = Xc + A * cos(θ)<br>Y = Yc + B * sin(θ)`;
            if(currentKurva==='parabola') txt = `X = Xp + t<br>Y = Yp + (A * t²)`;
            if(currentKurva==='hiperbola') txt = `X = Xc ± A * (1/cos(θ))<br>Y = Yc + B * tan(θ)`;
            document.getElementById('formula-display').innerHTML = txt;
        }

        function drawGrid() {
            ctxBg.clearRect(0,0,SIZE,SIZE);
            ctxBg.strokeStyle = 'rgba(255,255,255,0.1)'; ctxBg.lineWidth = 1;
            ctxBg.beginPath(); ctxBg.moveTo(0, CENTER); ctxBg.lineTo(SIZE, CENTER); ctxBg.stroke();
            ctxBg.beginPath(); ctxBg.moveTo(CENTER, 0); ctxBg.lineTo(CENTER, SIZE); ctxBg.stroke();
            ctxBg.fillStyle = 'rgba(255,255,255,0.4)'; ctxBg.font = '10px sans-serif';
            ctxBg.fillText("(0,0)", CENTER+5, CENTER+15);
            ctxBg.fillText("+X", SIZE-20, CENTER-10); ctxBg.fillText("+Y", CENTER+10, 20);
        }

        function render() {
            updateRumusText();
            const t0 = performance.now();
            generatedPoints = [];
            let step = getV('inp-step', 0.05); if(step<0.001) step=0.01;
            
            const x=getV('x',0), y=getV('y',0), a=getV('a',0), b=getV('b',0), maxT=getV('maxT',6.28);
            
            if(currentKurva === 'lingkaran' || currentKurva === 'elips') {
                for(let t=0; t<=maxT; t+=step) {
                    let rx = currentKurva==='lingkaran'? getV('r',200) : a;
                    let ry = currentKurva==='lingkaran'? getV('r',200) : b;
                    let calcX = x + rx * Math.cos(t); let calcY = y + ry * Math.sin(t);
                    generatedPoints.push({t:t.toFixed(2), x:calcX, y:calcY});
                }
            } else if(currentKurva === 'parabola') {
                let stp = step>=1 ? step : step*maxT; if(stp<0.5) stp=0.5;
                for(let t=-maxT; t<=maxT; t+=stp) {
                    generatedPoints.push({t:t.toFixed(1), x: x+t, y: y + (a*t*t)});
                }
            } else if(currentKurva === 'hiperbola') {
                for(let t=-maxT; t<=maxT; t+=step) generatedPoints.push({t:t.toFixed(2), x: x + a*(1/Math.cos(t)), y: y + b*Math.tan(t)});
                generatedPoints[generatedPoints.length-1].break = true;
                for(let t=-maxT; t<=maxT; t+=step) generatedPoints.push({t:t.toFixed(2), x: x - a*(1/Math.cos(t)), y: y + b*Math.tan(t)});
            }

            // Draw to Canvas
            ctxCurve.clearRect(0,0,SIZE,SIZE);
            ctxCurve.strokeStyle = '#06b6d4'; ctxCurve.lineWidth = 2.5;
            ctxCurve.lineJoin = 'round';
            
            let htmlTable = "";
            let isFirst = true;

            for(let i=0; i<generatedPoints.length; i++) {
                let p = generatedPoints[i];
                let sx = CENTER + p.x, sy = CENTER - p.y;
                p.sx = sx; p.sy = sy; // Simpan kordinat layar untuk interaksi mouse
                
                if(sy > -5000 && sy < 5000) { // Anti overflow
                    if(isFirst) { ctxCurve.beginPath(); ctxCurve.moveTo(sx, sy); isFirst = false; } 
                    else { ctxCurve.lineTo(sx, sy); }
                }
                if(p.break) isFirst = true;

                // Log table (batasi 1000 agar tidak lag)
                if(i < 1000) {
                    htmlTable += `<tr><td>${i}</td><td>${p.t}</td><td class="val-highlight">${p.x.toFixed(1)}, ${p.y.toFixed(1)}</td></tr>`;
                }
            }
            ctxCurve.stroke();

            const t1 = performance.now();
            document.getElementById('metrik-info').innerHTML = `Total Titik: <b style="color:#10b981">${generatedPoints.length}</b> | Eksekusi: <b>${(t1-t0).toFixed(1)}ms</b>`;
            document.getElementById('logBody').innerHTML = htmlTable;
        }

        // TOOLTIP INTERAKTIF DI CANVAS MOUSE MOVE
        canvasUI.addEventListener('mousemove', (e) => {
            const rect = canvasUI.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // Konversi posisi mouse ke kartesian untuk label pojok kiri atas
            const cartX = mouseX - CENTER;
            const cartY = CENTER - mouseY;
            document.getElementById('cursor-pos').innerText = `X: ${cartX.toFixed(0)}, Y: ${cartY.toFixed(0)}`;

            ctxUI.clearRect(0,0,SIZE,SIZE);
            
            // Cari titik kurva terdekat
            let closest = null; let minDist = 15; // Jarak sensitivitas hover 15px
            for(let p of generatedPoints) {
                if(!p.sx) continue;
                let dx = mouseX - p.sx, dy = mouseY - p.sy;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < minDist) { minDist = dist; closest = p; }
            }

            if(closest) {
                // Gambar Highlight Titik
                ctxUI.fillStyle = '#ec4899';
                ctxUI.beginPath(); ctxUI.arc(closest.sx, closest.sy, 5, 0, Math.PI*2); ctxUI.fill();
                ctxUI.strokeStyle = '#fff'; ctxUI.lineWidth=1.5; ctxUI.stroke();
                
                // Gambar Tooltip Kotak Melayang
                const text = `T: ${closest.t} | (X:${closest.x.toFixed(1)}, Y:${closest.y.toFixed(1)})`;
                ctxUI.fillStyle = 'rgba(15, 23, 42, 0.9)';
                ctxUI.fillRect(closest.sx + 10, closest.sy - 25, ctxUI.measureText(text).width + 20, 24);
                ctxUI.strokeStyle = '#ec4899'; ctxUI.strokeRect(closest.sx + 10, closest.sy - 25, ctxUI.measureText(text).width + 20, 24);
                
                ctxUI.fillStyle = '#fff';
                ctxUI.font = '11px "JetBrains Mono"';
                ctxUI.fillText(text, closest.sx + 20, closest.sy - 9);
            }
        });

        canvasUI.addEventListener('mouseout', () => ctxUI.clearRect(0,0,SIZE,SIZE));

        window.onload = () => { setKurva('lingkaran', document.querySelector('.tab-btn')); drawGrid(); render(); };
    </script>
</body>
</html>
